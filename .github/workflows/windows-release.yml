name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run release:win

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $installer = (Get-ChildItem "release" -Filter "school-scheduler-setup-*.exe" | Where-Object { $_.Name -notlike "*.blockmap" } | Select-Object -First 1).FullName
          $blockmap = "$installer.blockmap"
          $latest = (Get-Item "release\latest.yml").FullName

          if (-not $installer) { throw "Installer was not found" }
          if (-not (Test-Path $blockmap)) { throw "Installer blockmap was not found" }

          if (-not (gh release view $env:TAG_NAME 2>$null)) {
            gh release create $env:TAG_NAME --title $env:TAG_NAME --notes "Windows installer for ОЧУ ЦО Интеллект - Расписание."
          }

          gh release upload $env:TAG_NAME $installer $blockmap $latest --clobber
